<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop Watch</title>
  <link rel="stylesheet" href="stopWatch.css">
</head>
<body>
  <div class="container">
    <div class="numbers">
      <span id="hour-2">0</span>
      <span id="hour-1">0</span>
      <span class="mid">:</span>
      <span id="min-2">0</span>
      <span id="min-1">0</span>
      <span class="mid">:</span>
      <span id="sec-2">0</span>
      <span id="sec-1">0</span>
    </div>
    <div class="buttons">
      <button id="start">Start</button>
      <button id="pause">Pause</button>
      <button id="stop">Stop</button>
    </div>
  </div>
  <script src="stopWatch.js"></script>
</body>
</html>
